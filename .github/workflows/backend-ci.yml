# ============================================
# CI/CD — SchoolMS Backend
# Se ejecuta en cada push o pull request a main
# ============================================
name: 🌸 Backend CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  # ------------------------------------------
  # JOB 1: BUILD & TEST
  # ------------------------------------------
  build-and-test:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest

    # Base de datos PostgreSQL temporal para los tests
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: schoolms_test
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # 1. Descargar el código
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      # 2. Configurar Java 17
      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. Compilar el proyecto
      - name: 🔨 Compilar con Maven
        run: mvn clean compile -q

      # 4. Ejecutar tests
      - name: 🧪 Ejecutar tests
        run: mvn test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/schoolms_test
          SPRING_DATASOURCE_USERNAME: admin
          SPRING_DATASOURCE_PASSWORD: admin123

      # 5. Publicar resultado de tests
      - name: 📊 Publicar reporte de tests
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: target/surefire-reports/*.xml
          reporter: java-junit

      # 6. Empaquetar JAR
      - name: 📦 Empaquetar JAR
        run: mvn package -DskipTests -q

      # 7. Subir el JAR como artefacto
      - name: 📤 Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: schoolms-backend
          path: target/*.jar
          retention-days: 7

  # ------------------------------------------
  # JOB 2: CODE QUALITY CHECK
  # ------------------------------------------
  code-quality:
    name: 🔍 Calidad de Código
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Verificar que no hay errores de compilación ni warnings graves
      - name: 🔎 Verificar calidad
        run: mvn verify -DskipTests -q

      - name: ✅ Notificación de éxito
        if: success()
        run: echo "✅ El código pasó todas las verificaciones correctamente"

      - name: ❌ Notificación de fallo
        if: failure()
        run: echo "❌ El código tiene errores — revisa los logs"
